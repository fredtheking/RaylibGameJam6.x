<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <title></title>
    
        <link href="./main.js" rel="modulepreload"/>
        <link href="./_framework/dotnet.js" rel="modulepreload"/>
    
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
    
            body {
                background-color: #111113;
                overflow: hidden;
            }
    
            .canvas-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                width: 100vw;
                padding: 24px;
            }
    
            .game-container {
                display: flex;
                flex-direction: column;
                background-color: #161618;
                border: 1px solid #2c2c2e;
                border-radius: 12px;
                padding: 12px;
                gap: 12px; 
                max-width: 100%;
                max-height: 100%;
                box-shadow: 0 30px 50px -10px rgba(0, 0, 0, 0.7);
            }
    
            canvas {
                background-color: #000000;
                border-radius: 6px;
                max-width: 100%;
                max-height: calc(100vh - 120px);
                object-fit: contain;
                image-rendering: pixelated;
            }
    
            .controls {
                display: flex;
                width: 100%;
                gap: 8px;
            }
    
            .ctrl-btn {
                flex: 1;
                background-color: #1c1c1f;
                color: #e3e3e6;
                border: 1px solid #3a3a3c;
                padding: 10px 14px;
                border-radius: 6px;
                cursor: pointer;
                font-family: system-ui, sans-serif;
                font-size: 13px;
                font-weight: 500;
                text-align: center;
                transition: background-color 0.15s ease, border-color 0.15s ease;
            }
    
            .ctrl-btn:hover {
                background-color: #2c2c30;
                border-color: #48484a;
            }
    
            .ctrl-btn:active {
                background-color: #111113;
            }

            .ctrl-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div class="canvas-wrapper">
            <div class="game-container">
                <canvas id="canvas" oncontextmenu="event.preventDefault()" width="720" height="720"></canvas>
        
                <div class="controls">
                    <button class="ctrl-btn" id="btn-music">Roll new Music</button>
                    <button class="ctrl-btn" id="btn-mute">[ON] Sound</button>
                    <button class="ctrl-btn" id="btn-fullscreen">[OFF] Fullscreen</button>
                </div>
            </div>
        </div>
        
        <script src="./main.js" type="module"></script>
    </body>
</html>
