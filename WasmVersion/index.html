<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <title>raylib game</title>
    
        <link href="./main.js" rel="modulepreload"/>
        <link href="./_framework/dotnet.js" rel="modulepreload"/>
    
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
    
            body {
                background-color: #ffffff;
                color: #7c7c7c;
                font-family: 'Courier New', monospace;
                overflow: hidden;
            }
    
            .canvas-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                width: 100vw;
                padding: 20px;
            }
    
            .game-container {
                display: flex;
                flex-direction: column;
                background-color: #f5f5f5;
                border: 2px solid #7c7c7c;
                padding: 10px;
                gap: 10px;
                max-width: 100%;
                max-height: 100%;
            }
    
            canvas {
                background-color: #000000;
                border: 2px solid #7c7c7c;
                max-width: 100%;
                max-height: calc(100vh - 120px);
                object-fit: contain;
                image-rendering: pixelated;
            }
    
            .controls {
                display: flex;
                width: 100%;
                gap: 10px;
            }
    
            .ctrl-btn {
                flex: 1;
                background-color: #f5f5f5;
                color: #7c7c7c;
                border: 2px solid #7c7c7c;
                padding: 8px 12px;
                cursor: pointer;
                font-family: 'Courier New', monospace;
                font-size: 14px;
                font-weight: bold;
                text-align: center;
                text-transform: uppercase;
            }
    
            .ctrl-btn:hover {
                background-color: #7c7c7c;
                color: #f5f5f5;
            }
    
            .ctrl-btn:active {
                background-color: #ffffff;
                color: #7c7c7c;
            }
    
            .ctrl-btn:disabled {
                opacity: 0.3;
                cursor: not-allowed;
            }
        </style>
    </head>
    <body>
        <div class="canvas-wrapper">
            <div class="game-container">
                <canvas id="canvas" oncontextmenu="event.preventDefault()" width="720" height="720"></canvas>
        
                <div class="controls">
                    <button class="ctrl-btn" id="btn-music">Roll new Music</button>
                    <button class="ctrl-btn" id="btn-mute">[ON] Sound</button>
                    <button class="ctrl-btn" id="btn-fullscreen">[OFF] Fullscreen</button>
                </div>
            </div>
        </div>
        
        <script src="./main.js" type="module"></script>
    </body>
</html>
